version: '3.8'

services:
  greenpulse:
    build: .
    image: greenpulse:latest
    ports:
      - "5000:5000"
    environment:
      - FLASK_ENV=production
      - DATA_DIR=/app/data
    volumes:
      - plant_data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5000/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
    # Note: 'deploy.replicas' is a Docker Swarm feature.
    # For plain Compose, scale with: docker compose up -d --scale greenpulse=2

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - greenpulse
    restart: unless-stopped

volumes:
  plant_data:
